<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Resplandor — Menú de la semana</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
          rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { display: ['Fraunces', 'serif'], body: ['DM Sans', 'sans-serif'] },
                    colors: {
                        ember: { DEFAULT: '#B5341C', light: '#D4432A', faint: '#FDEAE7' },
                        teal: { DEFAULT: '#2A7B72', light: '#3A9E93', faint: '#E6F4F3' },
                        amber: { DEFAULT: '#C08B2C', light: '#D4A43E', faint: '#FDF3E0' },
                        parch: { DEFAULT: '#F7F2EC', dark: '#EDE5D9' },
                        ink: { DEFAULT: '#1C1A17', 700: '#3A3530', 500: '#6B6358', 300: '#B0A89E' },
                    },
                    borderRadius: { xl2: '1rem' },
                },
            },
        }
    </script>

    <style>
        :root {
            --ember: #B5341C; --teal: #2A7B72; --amber: #C08B2C;
            --parch: #F7F2EC; --parch-d: #EDE5D9; --ink: #1C1A17;
            --ink-5: #6B6358; --ink-3: #B0A89E; --line: rgba(28, 26, 23, 0.09);
        }
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--parch); color: var(--ink); -webkit-font-smoothing: antialiased; margin: 0; }
        [x-cloak] { display: none !important; }
        .font-display { font-family: 'Fraunces', serif; }

        /* Superficies estilo shadcn */
        .card { background: #fff; border: 1px solid var(--line); border-radius: 16px; }
        .card-soft { box-shadow: 0 1px 3px rgba(28,26,23,.05), 0 6px 20px -12px rgba(28,26,23,.12); }

        .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.68rem; font-weight: 600; letter-spacing: .02em; padding: 3px 9px; border-radius: 999px; }
        .badge-teal { background: var(--teal-faint, #E6F4F3); color: var(--teal); }
        .badge-amber { background: #FDF3E0; color: var(--amber); }
        .badge-neutral { background: #F1EDE7; color: var(--ink-5); }

        /* Botón base */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; font-weight: 600; font-size: 0.86rem; border-radius: 11px; padding: 9px 15px; cursor: pointer; border: 1px solid transparent; transition: background .15s, border-color .15s, transform .08s, box-shadow .15s; }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: var(--ember); color: #fff; }
        .btn-primary:hover { background: #D4432A; }
        .btn-outline { background: #fff; border-color: var(--line); color: var(--ink); }
        .btn-outline:hover { background: #FAF7F2; border-color: var(--ink-3); }
        .btn-ghost { background: transparent; color: var(--ink-5); }
        .btn-ghost:hover { background: #F1EDE7; color: var(--ink); }
        .icon-btn { width: 38px; height: 38px; border-radius: 11px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--line); background: #fff; cursor: pointer; transition: background .15s, border-color .15s; }
        .icon-btn:hover { background: #FAF7F2; border-color: var(--ink-3); }

        /* Reacciones */
        .react { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px; border-radius: 12px; border: 1.5px solid var(--line); background: #fff; cursor: pointer; transition: all .14s; }
        .react:hover { border-color: var(--ink-3); background: #FAF7F2; }
        .react .em { font-size: 1.28rem; line-height: 1; }
        .react .n { font-size: 0.72rem; font-weight: 700; color: var(--ink-5); font-variant-numeric: tabular-nums; }
        .react .lbl { font-size: 0.6rem; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .03em; }
        .react.on-like { border-color: var(--teal); background: var(--teal-faint, #E6F4F3); }
        .react.on-like .n, .react.on-like .lbl { color: var(--teal); }
        .react.on-igual { border-color: var(--amber); background: #FDF3E0; }
        .react.on-igual .n, .react.on-igual .lbl { color: var(--amber); }
        .react.on-dislike { border-color: var(--ember); background: #FDEAE7; }
        .react.on-dislike .n, .react.on-dislike .lbl { color: var(--ember); }
        .react.on-mover { border-color: #6366F1; background: #EEF0FE; }
        .react.on-mover .n, .react.on-mover .lbl { color: #4F46E5; }

        /* Día del calendario */
        .day-cell { display: flex; flex-direction: column; gap: 7px; padding: 12px; text-align: left; cursor: pointer; transition: box-shadow .15s, transform .12s, border-color .15s; }
        .day-cell:hover { box-shadow: 0 8px 26px -14px rgba(28,26,23,.3); transform: translateY(-2px); border-color: var(--ink-3); }
        .day-cell.hoy { border-color: var(--ember); box-shadow: 0 0 0 1px var(--ember); }
        .day-num { font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.15rem; line-height: 1; }
        .day-name { font-size: 0.64rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-5); }

        .opt-mini { border-top: 1px solid var(--line); padding-top: 6px; }
        .opt-mini:first-of-type { border-top: none; padding-top: 0; }

        .comp-row { display: flex; align-items: baseline; gap: 8px; padding: 5px 0; border-bottom: 1px dashed var(--line); }
        .comp-row:last-child { border-bottom: none; }
        .comp-em { width: 20px; text-align: center; flex-shrink: 0; }
        .comp-k { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-3); width: 74px; flex-shrink: 0; }
        .comp-v { font-size: 0.9rem; font-weight: 500; }

        /* Chips de día (móvil) */
        .chip-day { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 14px; border-radius: 13px; border: 1.5px solid var(--line); background: #fff; cursor: pointer; min-width: 58px; transition: all .14s; }
        .chip-day.sel { border-color: var(--ember); background: #fff; box-shadow: 0 0 0 1px var(--ember); }
        .chip-day.hoy-dot { position: relative; }

        /* Dialog */
        .overlay { position: fixed; inset: 0; background: rgba(28,26,23,.5); backdrop-filter: blur(3px); z-index: 60; }
        .dialog { position: fixed; z-index: 61; background: #fff; }
        @media (min-width: 640px) {
            .dialog { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 560px; max-width: calc(100vw - 32px); max-height: 88vh; border-radius: 20px; overflow: hidden; box-shadow: 0 24px 70px rgba(28,26,23,.32); }
        }
        @media (max-width: 639px) {
            .dialog { inset: 0; display: flex; flex-direction: column; }
        }

        .field { width: 100%; padding: 10px 13px; border: 1.5px solid var(--line); border-radius: 11px; font-family: 'DM Sans'; font-size: 0.9rem; background: #FCFAF7; outline: none; transition: border-color .15s; }
        .field:focus { border-color: var(--teal); background: #fff; }

        .skel { background: linear-gradient(90deg, #EFEAE3 25%, #F6F2EC 37%, #EFEAE3 63%); background-size: 400% 100%; animation: sh 1.3s ease-in-out infinite; border-radius: 12px; }
        @keyframes sh { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        .toast { position: fixed; left: 50%; bottom: calc(18px + env(safe-area-inset-bottom)); transform: translateX(-50%); background: var(--ink); color: #fff; font-size: 0.84rem; font-weight: 500; padding: 11px 20px; border-radius: 999px; box-shadow: 0 8px 30px rgba(28,26,23,.3); z-index: 80; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--parch-d); border-radius: 3px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

<body x-data="menuCal()" x-init="init()">

<!-- Header -->
<header class="sticky top-0 z-40" style="background:rgba(247,242,236,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
        <div class="flex-1 min-w-0">
            <div class="font-display text-lg font-bold leading-none">Resplandor<span style="color:var(--ember)">·</span></div>
            <div class="text-[0.62rem] font-bold tracking-[0.18em] uppercase" style="color:var(--ink-5)">Menú de la semana</div>
        </div>
        <!-- Estado de conexión -->
        <span x-show="!online" x-cloak class="badge badge-amber" title="Sin conexión">
            <i data-lucide="wifi-off" style="width:12px;height:12px"></i> Offline
        </span>
        <span x-show="cola.length > 0" x-cloak class="badge badge-neutral" x-text="cola.length + ' por enviar'"></span>
    </div>
    <!-- Navegación de semana -->
    <div class="max-w-5xl mx-auto px-4 pb-3 flex items-center gap-2">
        <button class="icon-btn" @click="cambiarSemana(-1)" aria-label="Semana anterior">
            <i data-lucide="chevron-left" style="width:18px;height:18px"></i>
        </button>
        <button class="btn btn-outline" @click="irHoy()" style="padding:8px 14px">Hoy</button>
        <div class="flex-1 text-center">
            <div class="font-display font-semibold leading-tight" x-text="tituloSemana"></div>
            <div class="text-[0.72rem]" style="color:var(--ink-5)" x-text="rangoSemana"></div>
        </div>
        <button class="icon-btn" @click="cambiarSemana(1)" aria-label="Semana siguiente">
            <i data-lucide="chevron-right" style="width:18px;height:18px"></i>
        </button>
    </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-5">

    <!-- Cargando (skeleton) -->
    <div x-show="estado === 'cargando'" class="grid grid-cols-2 md:grid-cols-3 gap-3">
        <template x-for="i in 6" :key="i"><div class="skel" style="height:150px"></div></template>
    </div>

    <!-- Error / offline sin datos -->
    <div x-show="(estado === 'error' || estado === 'offline') && !hayDatos" x-cloak class="card card-soft text-center" style="padding:44px 24px">
        <div style="font-size:2rem">🍽️</div>
        <p class="mt-2 font-medium" x-text="estado === 'offline' ? 'Estás sin conexión' : 'No pudimos cargar el menú'"></p>
        <p class="text-sm mt-1" style="color:var(--ink-5)">Revisa tu conexión e intenta de nuevo.</p>
        <button class="btn btn-primary mt-4" @click="cargar()">
            <i data-lucide="refresh-cw" style="width:15px;height:15px"></i> Reintentar
        </button>
    </div>

    <!-- Sin menú publicado -->
    <div x-show="estado === 'listo' && !hayDatos" x-cloak class="card card-soft text-center" style="padding:44px 24px">
        <div style="font-size:2rem">📅</div>
        <p class="mt-2 font-medium">Aún no hay menú para esta semana</p>
        <p class="text-sm mt-1" style="color:var(--ink-5)">Vuelve pronto o revisa otra semana.</p>
    </div>

    <div x-show="estado === 'listo' && hayDatos" x-cloak>
        <p class="text-center text-sm mb-4" style="color:var(--ink-5)">
            Cada día tiene 2 menús — toca un día y vota por tu favorito 👇
        </p>

        <!-- Chips de día (móvil) -->
        <div class="md:hidden flex gap-2 overflow-x-auto no-scrollbar pb-1 mb-3">
            <template x-for="d in dias" :key="d.dia">
                <button class="chip-day" :class="d.esHoy ? 'sel' : ''" @click="abrirDia(d.dia)">
                    <span class="day-name" x-text="d.nombre.slice(0,3)"></span>
                    <span class="day-num" x-text="d.fecha.getDate()"></span>
                    <span x-show="d.esHoy" class="badge badge-neutral" style="padding:1px 6px;font-size:0.55rem">Hoy</span>
                </button>
            </template>
        </div>

        <!-- Grilla semana (desktop) -->
        <div class="hidden md:grid md:grid-cols-3 gap-3">
            <template x-for="d in dias" :key="d.dia">
                <div class="card card-soft day-cell" :class="d.esHoy ? 'hoy' : ''" @click="abrirDia(d.dia)">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="day-name" x-text="d.nombre"></div>
                            <div class="day-num" x-text="d.fecha.toLocaleDateString('es-CO',{day:'numeric',month:'short'})"></div>
                        </div>
                        <span x-show="d.esHoy" class="badge badge-teal">Hoy</span>
                    </div>
                    <template x-for="m in d.menus" :key="m.id">
                        <div class="opt-mini">
                            <div class="flex items-center gap-1.5">
                                <span class="badge" :class="m.fijo ? 'badge-amber' : 'badge-neutral'" x-text="m.etiqueta"></span>
                            </div>
                            <div class="text-sm font-semibold mt-0.5 leading-tight"
                                 x-text="[m.sopa, m.principal].filter(Boolean).join(' · ')"></div>
                            <div class="text-xs leading-snug mt-0.5" style="color:var(--ink-5)"
                                 x-show="[m.guarnicion, m.ensalada, m.jugo].filter(Boolean).length"
                                 x-text="[m.guarnicion, m.ensalada, m.jugo].filter(Boolean).join(' · ')"></div>
                            <div class="flex gap-2 mt-1 text-xs" style="color:var(--ink-5)">
                                <template x-if="m.opcion !== 3">
                                    <span>🗳️ <span x-text="conteoEleccion(m.dia, m.opcion)"></span> voto(s)<span x-show="conteo(m.id,'mover')"> · 📅 <span x-text="conteo(m.id,'mover')"></span></span></span>
                                </template>
                                <template x-if="m.opcion === 3">
                                    <span style="color:var(--ink-3)">Siempre disponible</span>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>
</main>

<!-- ══════════ DIALOG: DÍA ══════════ -->
<template x-if="diaSel">
    <div>
        <div class="overlay" @click="cerrarDia()"
             x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"></div>
        <div class="dialog" x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 sm:scale-95" x-transition:enter-end="opacity-100 sm:scale-100">
            <!-- Header dialog -->
            <div class="flex items-center gap-3 px-5 py-4" style="border-bottom:1px solid var(--line)">
                <div class="flex-1">
                    <div class="day-name" x-text="diaSelData?.nombre"></div>
                    <div class="font-display text-lg font-semibold leading-tight"
                         x-text="diaSelData?.fecha.toLocaleDateString('es-CO',{day:'numeric',month:'long'})"></div>
                </div>
                <span x-show="diaSelData?.esHoy" class="badge badge-teal">Hoy</span>
                <button class="icon-btn" @click="cerrarDia()"><i data-lucide="x" style="width:17px;height:17px"></i></button>
            </div>

            <!-- Cuerpo scrollable -->
            <div class="px-5 py-4 overflow-y-auto" style="flex:1;max-height:calc(88vh - 150px)">
                <template x-for="m in (diaSelData?.menus || [])" :key="m.id">
                    <div class="card mb-4" style="padding:15px">
                        <div class="flex items-center justify-between mb-2.5">
                            <span class="badge" :class="m.fijo ? 'badge-amber' : 'badge-teal'" x-text="m.etiqueta"></span>
                            <span x-show="m.fijo" class="text-[0.68rem]" style="color:var(--ink-3)">Todos los días</span>
                        </div>

                        <!-- Componentes -->
                        <div>
                            <template x-for="c in componentes(m)" :key="c.k">
                                <div class="comp-row">
                                    <span class="comp-em" x-text="c.em"></span>
                                    <span class="comp-k" x-text="c.k"></span>
                                    <span class="comp-v" x-text="c.v"></span>
                                </div>
                            </template>
                        </div>

                        <!-- Especial de la casa: sin votación -->
                        <template x-if="m.opcion === 3">
                            <div class="mt-3 text-center text-sm" style="color:var(--amber);background:#FDF3E0;border-radius:12px;padding:11px">
                                ⭐ Especial de la casa — siempre disponible, sin votación
                            </div>
                        </template>

                        <!-- Opciones 1 y 2: elegir este menú + mover a otro día -->
                        <template x-if="m.opcion !== 3">
                            <div class="mt-3">
                                <button class="btn w-full" :class="miEleccion(m.dia) === m.opcion ? 'btn-primary' : 'btn-outline'"
                                        @click="elegir(m.dia, m.opcion)">
                                    <span x-show="miEleccion(m.dia) === m.opcion">✓ Tu elección</span>
                                    <span x-show="miEleccion(m.dia) !== m.opcion">Elegir este menú</span>
                                </button>
                                <div class="mt-2" style="height:6px;background:#EFEAE3;border-radius:999px;overflow:hidden">
                                    <div :style="`width:${porcentajeEleccion(m.dia, m.opcion)}%;height:100%;background:var(--teal);transition:width .3s`"></div>
                                </div>
                                <div class="flex items-center justify-between mt-1.5 text-xs" style="color:var(--ink-5)">
                                    <span x-text="conteoEleccion(m.dia, m.opcion) + ' voto(s) · ' + porcentajeEleccion(m.dia, m.opcion) + '%'"></span>
                                    <button class="btn-ghost" style="padding:4px 9px;font-size:0.78rem"
                                            :style="miReaccion(m.id)?.tipo === 'mover' ? 'color:#4F46E5' : ''"
                                            @click="abrirMover(m)">📅 Mover a otro día</button>
                                </div>
                            </div>
                        </template>

                        <!-- Popover mover -->
                        <div x-show="moverMenu === m.id" x-cloak x-transition class="mt-3 p-3 rounded-xl" style="background:#F6F4FF;border:1px solid #E0E1FB">
                            <div class="text-xs font-semibold mb-2" style="color:#4F46E5">¿Para qué día lo sugieres?</div>
                            <div class="flex flex-wrap gap-1.5 mb-2">
                                <template x-for="d in dias" :key="d.dia">
                                    <button class="chip-day" style="min-width:auto;padding:5px 10px"
                                            :class="moverForm.dia === d.dia ? 'sel' : ''" @click="moverForm.dia = d.dia">
                                        <span class="day-name" x-text="d.nombre.slice(0,3)"></span>
                                    </button>
                                </template>
                            </div>
                            <input type="text" class="field" x-model="moverForm.comentario" placeholder="Comentario (opcional)" maxlength="140" />
                            <div class="flex gap-2 mt-2 justify-end">
                                <button class="btn btn-ghost" style="padding:7px 12px" @click="moverMenu = null">Cancelar</button>
                                <button class="btn btn-primary" style="padding:7px 14px" :disabled="!moverForm.dia" @click="confirmarMover(m)">Enviar</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Footer: sugerir plato -->
            <div class="px-5 py-3" style="border-top:1px solid var(--line)">
                <button class="btn btn-outline w-full" @click="abrirSugerir()">
                    <i data-lucide="lightbulb" style="width:15px;height:15px"></i>
                    Sugerir un plato o menú
                </button>
            </div>
        </div>
    </div>
</template>

<!-- ══════════ DIALOG: SUGERIR PLATO ══════════ -->
<template x-if="sugerirAbierto">
    <div>
        <div class="overlay" @click="sugerirAbierto = false"></div>
        <div class="dialog" style="max-height:none">
            <div class="flex items-center gap-3 px-5 py-4" style="border-bottom:1px solid var(--line)">
                <div class="flex-1 font-display text-lg font-semibold">Sugerir un plato</div>
                <button class="icon-btn" @click="sugerirAbierto = false"><i data-lucide="x" style="width:17px;height:17px"></i></button>
            </div>
            <div class="px-5 py-4">
                <p class="text-sm mb-3" style="color:var(--ink-5)">
                    ¿Qué te gustaría comer? Tu idea llega directo a la cocina.
                </p>
                <textarea class="field" rows="3" x-model="sugerirTexto" maxlength="200"
                          placeholder="Ej: Me encantaría un mote de queso o una lasaña casera"></textarea>
            </div>
            <div class="px-5 py-3 flex gap-2 justify-end" style="border-top:1px solid var(--line)">
                <button class="btn btn-ghost" @click="sugerirAbierto = false">Cancelar</button>
                <button class="btn btn-primary" :disabled="!sugerirTexto.trim()" @click="enviarSugerencia()">
                    <i data-lucide="send" style="width:14px;height:14px"></i> Enviar
                </button>
            </div>
        </div>
    </div>
</template>

<!-- Toast -->
<div x-data x-show="$store.toastMsg" x-cloak class="toast" x-text="$store.toastMsg"
     x-transition:enter="transition ease-out" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100"></div>

<script>
    const SUPABASE_URL = 'https://yjtcrhmdztbuylgpuvsm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1YEHWCyA6er72OsiXzpSyQ_eZx59p_7';
    const DIAS = ['', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function lunesDe(fecha) {
        const d = new Date(fecha);
        const dow = d.getDay() === 0 ? 7 : d.getDay();
        d.setDate(d.getDate() - (dow - 1));
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${d.getFullYear()}-${mm}-${dd}`;
    }

    document.addEventListener('alpine:init', () => { Alpine.store('toastMsg', ''); });

    function menuCal() {
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        return {
            estado: 'cargando',            // cargando | listo | error | offline
            online: navigator.onLine,
            semana: lunesDe(new Date()),
            menusSemana: [],
            elecciones: [],                // voto: 1 elección por día por dispositivo
            reacciones: [],                // solo 'mover a otro día'
            cola: [],                      // reintentos pendientes (localStorage)

            diaSel: null,                  // día abierto en el dialog
            moverMenu: null,               // menu_id con el popover "mover" abierto
            moverForm: { dia: null, comentario: '' },
            sugerirAbierto: false,
            sugerirTexto: '',

            deviceId: (() => {
                let id = localStorage.getItem('menu_device_id');
                if (!id) { id = uid(); localStorage.setItem('menu_device_id', id); }
                return id;
            })(),

            init() {
                try { this.cola = JSON.parse(localStorage.getItem('menu_retry_queue') || '[]'); } catch { this.cola = []; }
                window.addEventListener('online', () => { this.online = true; this.flushCola(); this.cargar(); });
                window.addEventListener('offline', () => { this.online = false; });
                setInterval(() => { if (this.online && this.cola.length) this.flushCola(); }, 20000);
                this.cargar();
                this.$watch('diaSel', v => { document.body.style.overflow = v ? 'hidden' : ''; this.iconos(); });
                this.$watch('estado', () => this.iconos());
            },

            iconos() { setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 40); },

            get hayDatos() { return this.menusSemana.length > 0; },

            get tituloSemana() {
                return new Date(this.semana + 'T00:00:00').toLocaleDateString('es-CO', { month: 'long', year: 'numeric' })
                    .replace(/^\w/, c => c.toUpperCase());
            },
            get rangoSemana() {
                const ini = new Date(this.semana + 'T00:00:00');
                const fin = new Date(ini); fin.setDate(fin.getDate() + 5);
                const f = d => d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short' });
                return `${f(ini)} – ${f(fin)}`;
            },
            get diaHoy() {
                if (lunesDe(new Date()) !== this.semana) return null;
                const dow = new Date().getDay() === 0 ? 7 : new Date().getDay();
                return dow >= 1 && dow <= 6 ? dow : null;
            },
            fechaDe(d) { const b = new Date(this.semana + 'T00:00:00'); b.setDate(b.getDate() + (d - 1)); return b; },

            get dias() {
                const arr = [];
                for (let d = 1; d <= 6; d++) {
                    const menus = this.menusSemana.filter(m => m.dia === d).sort((a, b) => a.opcion - b.opcion);
                    if (!menus.length) continue;
                    arr.push({ dia: d, nombre: DIAS[d], fecha: this.fechaDe(d), esHoy: this.diaHoy === d, menus });
                }
                return arr;
            },
            get diaSelData() { return this.dias.find(d => d.dia === this.diaSel) || null; },

            componentes(m) {
                return [
                    { k: 'Sopa', em: '🥣', v: m.sopa },
                    { k: 'Principal', em: '🍽️', v: m.principal },
                    { k: 'Guarnición', em: '🍚', v: m.guarnicion },
                    { k: 'Ensalada', em: '🥗', v: m.ensalada },
                    { k: 'Jugo', em: '🥤', v: m.jugo },
                ].filter(c => c.v && c.v.trim());
            },

            conteo(menuId, tipo) { return this.reacciones.filter(r => r.menu_id === menuId && r.tipo === tipo).length; },
            miReaccion(menuId) { return this.reacciones.find(r => r.menu_id === menuId && r.device_id === this.deviceId) || null; },

            // ---- Elección del día (votar 1 de las 2 opciones) ----
            miEleccion(dia) {
                const e = this.elecciones.find(x => x.dia === dia && x.device_id === this.deviceId);
                return e ? e.opcion_elegida : null;
            },
            conteoEleccion(dia, opcion) {
                return this.elecciones.filter(e => e.dia === dia && e.opcion_elegida === opcion).length;
            },
            porcentajeEleccion(dia, opcion) {
                const t = this.conteoEleccion(dia, 1) + this.conteoEleccion(dia, 2);
                return t ? Math.round(this.conteoEleccion(dia, opcion) / t * 100) : 0;
            },
            async elegir(dia, opcion) {
                if (this.miEleccion(dia) === opcion) return;
                this.elecciones = this.elecciones.filter(e => !(e.dia === dia && e.device_id === this.deviceId));
                this.elecciones.push({ dia, opcion_elegida: opcion, device_id: this.deviceId });
                this.cachearActual();

                const fila = { id: 'e_' + this.semana + '_' + dia + '_' + this.deviceId, semana: this.semana, dia, opcion_elegida: opcion, device_id: this.deviceId };
                try {
                    const { error } = await sb.from('elecciones_menu').upsert(fila, { onConflict: 'semana,dia,device_id' });
                    if (error) throw error;
                    this.toast('¡Gracias por tu voto!');
                } catch (e) {
                    console.error('Voto fallido, encolando', e);
                    this.encolar({ kind: 'eleccion', fila });
                    this.toast('Sin conexión — se enviará solo');
                }
            },

            // ---- Carga con caché + tolerancia a fallos ----
            async cargar() {
                try {
                    const cache = JSON.parse(localStorage.getItem('menu_cache_' + this.semana) || 'null');
                    if (cache) {
                        this.menusSemana = cache.menus; this.reacciones = cache.reacciones || [];
                        this.elecciones = cache.elecciones || []; this.estado = 'listo';
                    }
                    else if (this.estado !== 'listo') this.estado = 'cargando';
                } catch { }

                try {
                    const { data: menus, error: e1 } = await sb.from('menus')
                        .select('*').eq('semana', this.semana).eq('activo', true).order('dia').order('opcion');
                    if (e1) throw e1;
                    let reacc = [];
                    if (menus.length) {
                        const ids = menus.map(m => m.id);
                        const { data, error: e2 } = await sb.from('reacciones_menu')
                            .select('menu_id, tipo, dia_sugerido, comentario, device_id').in('menu_id', ids);
                        if (e2) throw e2;
                        reacc = data || [];
                    }
                    const { data: elec, error: e4 } = await sb.from('elecciones_menu')
                        .select('dia, opcion_elegida, device_id').eq('semana', this.semana);
                    if (e4) throw e4;
                    this.menusSemana = menus;
                    this.reacciones = reacc;
                    this.elecciones = elec || [];
                    this.cachearActual();
                    this.estado = 'listo';
                } catch (e) {
                    console.error('Error cargando menú', e);
                    if (this.hayDatos) this.estado = 'listo';           // sirve caché
                    else this.estado = navigator.onLine ? 'error' : 'offline';
                }
                this.iconos();
            },

            cambiarSemana(delta) {
                const d = new Date(this.semana + 'T00:00:00');
                d.setDate(d.getDate() + delta * 7);
                this.semana = lunesDe(d);
                this.diaSel = null;
                this.cargar();
            },
            irHoy() { this.semana = lunesDe(new Date()); this.diaSel = null; this.cargar(); },

            abrirDia(d) { this.diaSel = d; this.moverMenu = null; },
            cerrarDia() { this.diaSel = null; this.moverMenu = null; },

            // ---- Reacciones (optimista + rollback + cola) ----
            async reaccionar(menu, tipo, extra = {}) {
                const previa = this.miReaccion(menu.id);
                if (previa && previa.tipo === tipo && tipo !== 'mover') return;

                const nueva = {
                    menu_id: menu.id, tipo,
                    dia_sugerido: extra.dia_sugerido ?? null,
                    comentario: extra.comentario ?? '',
                    device_id: this.deviceId
                };
                this.reacciones = this.reacciones.filter(r => !(r.menu_id === menu.id && r.device_id === this.deviceId));
                this.reacciones.push(nueva);
                this.cachearActual();

                const fila = { id: 'r_' + menu.id + '_' + this.deviceId, ...nueva };
                try {
                    const { error } = await sb.from('reacciones_menu').upsert(fila, { onConflict: 'menu_id,device_id' });
                    if (error) throw error;
                    this.toast(tipo === 'mover' ? 'Sugerencia registrada ✓' : '¡Gracias por tu voto!');
                } catch (e) {
                    console.error('Voto fallido, encolando', e);
                    this.encolar({ kind: 'reaccion', fila });
                    this.toast('Sin conexión — se enviará solo');
                }
            },

            abrirMover(menu) {
                if (this.moverMenu === menu.id) { this.moverMenu = null; return; }
                const previa = this.miReaccion(menu.id);
                this.moverForm = {
                    dia: previa?.tipo === 'mover' ? previa.dia_sugerido : null,
                    comentario: previa?.tipo === 'mover' ? (previa.comentario || '') : ''
                };
                this.moverMenu = menu.id;
            },
            confirmarMover(menu) {
                if (!this.moverForm.dia) return;
                this.reaccionar(menu, 'mover', { dia_sugerido: this.moverForm.dia, comentario: this.moverForm.comentario.trim() });
                this.moverMenu = null;
            },

            // ---- Sugerir plato ----
            abrirSugerir() { this.sugerirTexto = ''; this.sugerirAbierto = true; this.iconos(); },
            async enviarSugerencia() {
                const texto = this.sugerirTexto.trim();
                if (!texto) return;
                const fila = { id: uid(), semana: this.semana, dia: this.diaSel, texto, device_id: this.deviceId };
                this.sugerirAbierto = false;
                try {
                    const { error } = await sb.from('sugerencias_plato').insert(fila);
                    if (error) throw error;
                    this.toast('¡Gracias por tu sugerencia! 🙌');
                } catch (e) {
                    console.error('Sugerencia fallida, encolando', e);
                    this.encolar({ kind: 'sugerencia', fila });
                    this.toast('Sin conexión — se enviará solo');
                }
            },

            // ---- Cola de reintentos ----
            encolar(op) { this.cola.push(op); this.guardarCola(); },
            guardarCola() { localStorage.setItem('menu_retry_queue', JSON.stringify(this.cola)); },
            cachearActual() {
                localStorage.setItem('menu_cache_' + this.semana, JSON.stringify({
                    menus: this.menusSemana, reacciones: this.reacciones, elecciones: this.elecciones
                }));
            },
            async flushCola() {
                const pendientes = [...this.cola];
                for (const op of pendientes) {
                    try {
                        if (op.kind === 'reaccion') {
                            const { error } = await sb.from('reacciones_menu').upsert(op.fila, { onConflict: 'menu_id,device_id' });
                            if (error) throw error;
                        } else if (op.kind === 'eleccion') {
                            const { error } = await sb.from('elecciones_menu').upsert(op.fila, { onConflict: 'semana,dia,device_id' });
                            if (error) throw error;
                        } else if (op.kind === 'sugerencia') {
                            const { error } = await sb.from('sugerencias_plato').insert(op.fila);
                            if (error) throw error;
                        }
                        this.cola = this.cola.filter(x => x !== op);
                        this.guardarCola();
                    } catch (e) { break; }   // deja el resto para el próximo intento
                }
            },

            toast(msg) {
                Alpine.store('toastMsg', msg);
                clearTimeout(this._t);
                this._t = setTimeout(() => Alpine.store('toastMsg', ''), 2400);
            }
        };
    }
</script>
